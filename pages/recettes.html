<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Découvrez toutes nos recettes - CrazyCook">
    <title>Recettes - CrazyCook</title>
    <link rel="icon" href="../assets/img/logo.svg" type="image/svg+xml">
    <link rel="stylesheet" href="../assets/css/style.css">
</head>
<body>
    <header class="site-header">
        <div class="header-container">
            <a href="../index.html" class="logo">
                <img src="../assets/img/logo.svg" alt="CrazyCook">
                <span>CrazyCook</span>
            </a>
            <form class="search-form" action="recettes.html" method="get">
                <input type="search" name="q" placeholder="Rechercher une recette..." aria-label="Rechercher">
                <button type="submit" aria-label="Lancer la recherche">🔍</button>
            </form>
        </div>
        <nav class="main-nav" aria-label="Navigation principale">
            <ul>
                <li><a href="../index.html">Accueil</a></li>
                <li><a href="recettes.html" class="active">Recettes</a></li>
                <li><a href="#">Blog culinaire</a></li>
                <li><a href="#">Astuces</a></li>
                <li><a href="#">À propos</a></li>
                <li><a href="contact.html">Contact</a></li>
            </ul>
        </nav>
    </header>

    <main class="recipes-page">
        <section class="page-header">
            <h1>Nos Recettes</h1>
            <p>Parcourez notre collection de recettes pour toutes les occasions</p>
        </section>

        <section class="filters">
            <div class="filter-group">
                <label for="category-filter">Catégorie:</label>
                <select id="category-filter">
                    <option value="">Toutes les catégories</option>
                    <option value="Entrée">Entrée</option>
                    <option value="Plat principal">Plat principal</option>
                    <option value="Dessert">Dessert</option>
                </select>
            </div>
            <div class="filter-group">
                <label for="difficulty-filter">Difficulté:</label>
                <select id="difficulty-filter">
                    <option value="">Toutes les difficultés</option>
                    <option value="Très facile">Très facile</option>
                    <option value="Facile">Facile</option>
                    <option value="Moyen">Moyen</option>
                    <option value="Difficile">Difficile</option>
                </select>
            </div>
        </section>

        <section class="recipes-container" id="recipes-container">
            <div class="loading">Chargement des recettes...</div>
        </section>
    </main>

    <footer class="site-footer">
        <p>© 2024 CrazyCook. Tous droits réservés.</p>
        <div class="socials">
            <a href="#">Facebook</a>
            <a href="#">Instagram</a>
            <a href="#">YouTube</a>
        </div>
    </footer>
    <script src="../assets/js/script.js" defer></script>
</body>
</html>
