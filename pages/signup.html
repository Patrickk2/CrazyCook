<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Créez un compte CrazyCook">
    <title>Inscription - CrazyCook</title>
    <link rel="icon" href="../assets/img/logo.svg" type="image/svg+xml">
    <link rel="stylesheet" href="../assets/css/style.css">
    <link rel="stylesheet" href="../assets/css/form.css">
</head>
<body>
    <header class="site-header">
        <div class="header-container">
            <a href="../index.html" class="logo">
                <img src="../assets/img/logo.svg" alt="CrazyCook">
                <span>CrazyCook</span>
            </a>
        </div>
        <nav class="main-nav">
            <ul>
                <li><a href="../index.html">Accueil</a></li>
                <li><a href="recettes.html">Recettes</a></li>
                <li><a href="contact.html">Contact</a></li>
                <li><a href="login.html">Connexion</a></li>
            </ul>
        </nav>
    </header>

    <main class="auth-page">
        <section class="page-header">
            <h1>Créer un compte</h1>
            <p>Rejoignez notre communauté de passionnés de cuisine !</p>
        </section>

        <section class="auth-form-section">
            <form class="form-box" action="#" method="post">
                <label for="first-name">Prénom</label>
                <input type="text" id="first-name" name="first-name" required>

                <label for="last-name">Nom</label>
                <input type="text" id="last-name" name="last-name">

                <label for="email">Email</label>
                <input type="email" id="email" name="email" required>

                <label for="password">Mot de passe</label>
                <input type="password" id="password" name="password" required>

                <label for="password-confirm">Confirmer le mot de passe</label>
                <input type="password" id="password-confirm" name="password-confirm" required>

                <button type="submit">Créer mon compte</button>
                <p>Déjà un compte ? <a href="login.html">Se connecter</a></p>
            </form>
        </section>
    </main>

    <footer class="site-footer">
        <p>© 2024 CrazyCook. Tous droits réservés.</p>
        <div class="socials">
            <a href="#">Facebook</a>
            <a href="#">Instagram</a>
            <a href="#">YouTube</a>
        </div>
    </footer>
</body>
</html>
