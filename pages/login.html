<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Connectez-vous à CrazyCook">
    <title>Connexion - CrazyCook</title>
    <link rel="icon" href="../assets/img/logo.svg" type="image/svg+xml">
    <link rel="stylesheet" href="../assets/css/style.css">
    <link rel="stylesheet" href="../assets/css/form.css">
</head>
<body>
    <header class="site-header">
        <div class="header-container">
            <a href="../index.html" class="logo">
                <img src="../assets/img/logo.svg" alt="CrazyCook">
                <span>CrazyCook</span>
            </a>
        </div>
        <nav class="main-nav" aria-label="Navigation principale">
            <ul>
                <li><a href="../index.html">Accueil</a></li>
                <li><a href="recettes.html">Recettes</a></li>
                <li><a href="contact.html">Contact</a></li>
                <li><a href="signup.html">Inscription</a></li>
            </ul>
        </nav>
    </header>

    <main class="auth-page">
        <section class="page-header">
            <h1>Connexion</h1>
            <p>Bienvenue ! Connectez-vous pour accéder à toutes nos recettes.</p>
        </section>

        <section class="auth-form-section">
            <form class="form-box" action="#" method="post">
                <label for="email">Email</label>
                <input id="email" type="email" name="email" required>

                <label for="password">Mot de passe</label>
                <input type="password" id="password" name="password" required>

                <button type="submit">Se connecter</button>
                <p>Pas encore de compte ? <a href="signup.html">Créer un compte</a></p>
            </form>
        </section>
    </main>

    <footer class="site-footer">
        <p>© 2024 CrazyCook. Tous droits réservés.</p>
        <div class="socials">
            <a href="#">Facebook</a>
            <a href="#">Instagram</a>
            <a href="#">YouTube</a>
        </div>
    </footer>
    <script src="../assets/js/script.js" defer></script>
</body>
</html>
